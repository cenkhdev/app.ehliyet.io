<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehliyet Sınav Soruları</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
        }

        /* Header */
        header {
            background-color: #2143b8;
            color: white;
            text-align: center;
            padding: 20px 15px;
            position: relative;
        }

        header h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .header-icons {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 18px;
        }

        .header-icons i:first-child {
            color: #f39c12;
            margin-right: 15px;
        }

        .header-icons i:last-child {
            color: #2c3e50;
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Kart Stilleri */
        a {
            text-decoration: none;
            color: inherit;
        }

        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            border: 1px solid #eaeaea;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card i {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 500;
        }

        /* Izgara (Grid) Yapıları */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .grid-4 .card {
            padding: 20px;
            background-color: #f4f6f9; /* Dörtlü kartların hafif gri arka planı var */
            border: none;
        }

        /* Alt Banner (Turuncu) */
        .promo-banner {
            background-color: #e86b3e;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            text-align: center;
        }

        .promo-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .download-btn {
            background-color: #35a383;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: #2b8b6e;
        }

        /* İkon Renkleri (Görsele Benzetme) */
        .icon-exam { color: #5b6279; }
        .icon-calendar { color: #5a87d9; }
        .icon-random { color: #5aa1df; }
        .icon-chat { color: #444; }
        .icon-stop { color: #e74c3c; }
        .icon-star { color: #f1c40f; }
        .icon-youtube { color: #e74c3c; }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
            .promo-banner {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-icons">
            <i class="fas fa-bell"></i>
            <i class="fas fa-user-circle"></i>
        </div>
        <h1>Ehliyet Sınav Soruları</h1>
        <p>Başarılar diliyorum!</p>
    </header>

    <div class="container">
        
        <a href="yeni.html" class="card">
            <i class="fas fa-file-signature icon-exam"></i>
            <span class="card-title">Çıkmış Sınav Soruları</span>
        </a>

        <div class="grid-2">
            <a href="yeni.html" class="card">
                <i class="far fa-calendar-check icon-calendar"></i>
                <span class="card-title">Günün Sınavı</span>
            </a>
            <a href="yeni.html" class="card">
                <i class="fas fa-random icon-random"></i>
                <span class="card-title">Rastgele Sınav</span>
            </a>
        </div>

        <div class="grid-4">
            <a href="yeni.html" class="card">
                <i class="far fa-comments icon-chat"></i>
            </a>
            <a href="yeni.html" class="card">
                <i class="fas fa-traffic-light icon-stop"></i>
            </a>
            <a href="yeni.html" class="card">
                <i class="fas fa-star icon-star"></i>
            </a>
            <a href="yeni.html" class="card">
                <i class="fab fa-youtube icon-youtube"></i>
            </a>
        </div>

        <div class="promo-banner">
            <span class="promo-text">🎉 Diğer Uygulamayı indirin! 🎉 Hemen tıklayın ve indirerek ! 🚀</span>
            <a href="https://indirr.ehliyet.io/" target="_blank" class="download-btn">Hemen İndir</a>
        </div>

    </div>

</body>
</html>
